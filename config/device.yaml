camera:
  backend: opencv
  index: 0
  resolution:
    width: 1920
    height: 1080
  preview:
    resolution:
      width: 1280
      height: 720
    target_fps: 30.0
    force_mjpeg: true
  autofocus_mode: continuous
  exposure: auto
  brightness: 0.0
  capture_delay_seconds: 1.0
  grayscale: false
  max_dimension: 1600
display:
  size:
    width: 1366
    height: 768
  orientation: landscape
  text_size: standard
  text_rendering: auto
button:
  enabled: true
  pin: 17
  mode_button_1_pin: 5
  mode_button_2_pin: 6
  mode_button_3_pin: 13
  mode_button_4_pin: 19
  mode_button_5_pin: 26
  back_button_pin: 22
  navigation_up_pin: 23
  navigation_down_pin: 24
  navigation_select_pin: 25
  debounce_seconds: 0.15
  hold_seconds: 1.2
led:
  enabled: true
  pin: 27
  active_high: true
ai:
  default_mode: read_text
vision:
  screen_optimization: auto
capture_review:
  default_profile: document
  quality:
    sharpness_warning_variance: 80.0
    brightness_dark_mean: 55.0
    brightness_bright_mean: 220.0
    glare_bright_ratio: 0.12
    minimum_crop_area_ratio: 0.035
  profiles:
    document:
      perspective_default: true
      auto_enhance_default: true
    computer_screen:
      perspective_default: false
      auto_enhance_default: false
    diagram:
      perspective_default: false
      auto_enhance_default: false
startup:
  behavior: kiosk
setup:
  completed: false
  completed_at: ''
  version: 0
setup_portal:
  enabled: true
  auto_start_when_setup_incomplete: true
  session_timeout_minutes: 15
  interface: wlan0
  address: 192.168.4.1
  port: 80
  ssid_prefix: VisionDesk-Setup
network:
  wifi:
    ssid: ''
    connection_name: ''
    auto_connect: true
    managed_by: nmcli
localization:
  locale: en
reliability:
  log_level: INFO
  log_max_bytes: 1048576
  log_backup_count: 5
  health_monitor_enabled: true
  health_check_interval_seconds: 60.0
  camera_probe_interval_seconds: 300.0
  openai_timeout_seconds: 30.0
  openai_retry_attempts: 3
  openai_retry_backoff_seconds: 2.0
retention:
  store_images: false
  text_history_max_items: 100
  text_history_retention_days: 30
  retry_media_retention_hours: 24.0
  purge_on_startup: true
offline_retry:
  enabled: true
  max_items: 10
  max_attempts: 3
  initial_delay_seconds: 30.0
  max_delay_seconds: 900.0
  poll_interval_seconds: 5.0
  min_free_mb: 128
  max_storage_mb: 512
