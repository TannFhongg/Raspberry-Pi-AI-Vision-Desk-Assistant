camera:
  backend: opencv
  index: 0
  resolution:
    width: 1920
    height: 1080
  preview:
    resolution:
      width: 640
      height: 360
    target_fps: 30.0
    force_mjpeg: true
  autofocus_mode: continuous
  exposure: auto
  brightness: 0.0
  capture_delay_seconds: 1.0
  grayscale: false
  max_dimension: 1600

display:
  size:
    width: 480
    height: 320
  orientation: landscape

button:
  enabled: true
  pin: 17
  mode_button_1_pin: 5
  mode_button_2_pin: 6
  mode_button_3_pin: 13
  mode_button_4_pin: 19
  mode_button_5_pin: 26
  back_button_pin: 22
  debounce_seconds: 0.15
  hold_seconds: 1.2

led:
  enabled: false
  pin: 27
  active_high: true

app:
  host: 127.0.0.1
  port: 5000
  debug: false

ai:
  default_mode: document_reader

vision:
  screen_optimization: auto

startup:
  behavior: kiosk
  url: http://127.0.0.1:5000

reliability:
  log_level: INFO
  log_max_bytes: 1048576
  log_backup_count: 5
  health_monitor_enabled: true
  health_check_interval_seconds: 60.0
  camera_probe_interval_seconds: 300.0
  openai_timeout_seconds: 30.0
  openai_retry_attempts: 3
  openai_retry_backoff_seconds: 2.0

retention:
  store_images: false
  text_history_max_items: 100
  text_history_retention_days: 30
  retry_media_retention_hours: 24.0
  purge_on_startup: true

offline_retry:
  enabled: true
  max_items: 10
  max_attempts: 3
  initial_delay_seconds: 30.0
  max_delay_seconds: 900.0
  poll_interval_seconds: 5.0
  min_free_mb: 128
  max_storage_mb: 512
