<div class="system-health-bar" aria-label="Device health" data-health-bar>
    <span class="health-pill health-pill-overall" data-health-overall data-status="{{ health_summary.overall.status }}" title="{{ health_summary.overall.message }}">{{ health_summary.overall.label }}</span>
    <span class="health-pill" data-health-cpu data-status="{{ health_summary.cpu.status }}" title="{{ health_summary.cpu.message }}">{{ health_summary.cpu.label }}</span>
    <span class="health-pill" data-health-memory data-status="{{ health_summary.memory.status }}" title="{{ health_summary.memory.message }}">{{ health_summary.memory.label }}</span>
    <span class="health-pill" data-health-network data-status="{{ health_summary.network.status }}" title="{{ health_summary.network.message }}">{{ health_summary.network.label }}</span>
    <span class="health-pill" data-health-camera data-status="{{ health_summary.camera.status }}" title="{{ health_summary.camera.message }}">{{ health_summary.camera.label }}</span>
</div>
