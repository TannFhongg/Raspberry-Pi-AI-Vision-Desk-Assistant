<div
    class="health-pill health-pill--{{ metric.state }}"
    data-health-pill
    data-health-pill-key="{{ metric.key }}"
    data-health-state="{{ metric.state }}"
    title="{{ metric.title }}"
    aria-label="{{ metric.aria_label }}"
>
    <span class="health-pill__label">{{ metric.label }}</span>
    <span class="health-pill__value health-pill__value--{{ metric.value_size|default('normal') }}" data-health-value>{{ metric.value }}</span>
</div>
